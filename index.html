<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painting Tool - Image Resizer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>画像リサイズ & パレット量子化</h1>

      <section class="controls">
        <label>
          画像アップロード
          <input
            id="imageInput"
            type="file"
            accept=".jpg,.jpeg,.png,image/jpeg,image/png"
          />
        </label>

        <label>
          出力比率
          <select id="ratioSelect">
            <option value="16:9">16:9</option>
            <option value="4:3">4:3</option>
            <option value="1:1">1:1</option>
            <option value="3:4">3:4</option>
            <option value="9:16">9:16</option>
          </select>
        </label>

        <label>
          出力サイズ
          <select id="sizeSelect"></select>
        </label>

        <label>
          拡大縮小モード
          <select id="fitModeSelect">
            <option value="fit">フィット</option>
            <option value="fill">フィル</option>
            <option value="stretch">ストレッチ</option>
          </select>
        </label>

        <label>
          パレット量子化
          <input id="quantizeToggle" type="checkbox" checked />
        </label>

        <label>
          ディザリングで色表現を増やす
          <input id="ditherToggle" type="checkbox" />
        </label>

        <label>
          ディザリング方式
          <select id="ditherMethodSelect">
            <option value="floyd-steinberg">誤差拡散 (Floyd–Steinberg)</option>
            <option value="ordered">Ordered</option>
          </select>
        </label>

        <label>
          明度
          <input id="brightnessRange" type="range" min="-100" max="100" value="0" />
        </label>

        <label>
          コントラスト
          <input id="contrastRange" type="range" min="-100" max="100" value="0" />
        </label>

        <label>
          色温度
          <input id="temperatureRange" type="range" min="-100" max="100" value="0" />
        </label>

        <button id="downloadButton" type="button" disabled>PNG ダウンロード</button>
      </section>

      <section class="preview">
        <h2>出力プレビュー</h2>
        <div class="canvas-container">
          <canvas id="outputCanvas" width="1280" height="720"></canvas>
        </div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
